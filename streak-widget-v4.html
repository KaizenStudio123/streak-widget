<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Streak — Content Creator Robot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p4:#3D348A;--p5:#5546B8;--p6:#7B6FD4;--p7:#A89FFF;--p8:#C9C2FF;--p9:#EAE8FF;
  --text:#EAE8FF;--tm:#7B6FD4;--border:rgba(123,111,212,0.25);--radius:20px;
}
html,body{width:100%;min-height:100vh;background:#191919;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}

/* ── WIDGET ── */
.widget{width:320px;background:#1a1730;border:1px solid var(--border);border-radius:var(--radius);padding:26px 24px 22px;position:relative;overflow:hidden;user-select:none}
#bgc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.z{position:relative;z-index:2}
.watermark{position:absolute;bottom:8px;left:12px;font-size:8px;color:rgba(220,215,255,0.72);letter-spacing:.06em;pointer-events:none;z-index:20}
.brand{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tm);text-align:center;margin-bottom:14px}

/* ══════════════════════════════════════════
   CUTE FLAME CHARACTER — pure CSS
══════════════════════════════════════════ */
.flame-stage{display:flex;flex-direction:column;align-items:center;margin-bottom:14px}
.flame-wrap{width:110px;height:150px;cursor:pointer;position:relative;display:flex;align-items:flex-end;justify-content:center}

/* idle bob animation */
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes wiggle{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
@keyframes popBounce{0%{transform:scale(1)}25%{transform:scale(1.15,.87)}55%{transform:scale(.92,1.1)}78%{transform:scale(1.05,.96)}100%{transform:scale(1)}}

.char{
  position:relative;
  width:90px;height:130px;
  animation:bob 2.3s ease-in-out infinite;
  transform-origin:50% 98%;
  transition:filter .6s;
}
.flame-wrap:hover .char{animation:wiggle .38s ease-in-out infinite;transform-origin:50% 98%}
.flame-wrap:active .char{transform:scale(.93)}
.char.pop{animation:popBounce .5s cubic-bezier(.34,1.56,.64,1) forwards}

/* ── FLAME BODY LAYERS ── */
/* main body — big rounded fat drop */
.f-body{
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:80px;height:95px;
  background:radial-gradient(ellipse at 50% 35%, #9B6FFF 0%, #5A30B8 50%, #2D1468 100%);
  border-radius:50% 50% 48% 48% / 40% 40% 60% 60%;
  box-shadow:0 0 0 0 rgba(155,111,255,0);
  transition:box-shadow .6s;
}
/* left wing */
.f-wing-l{
  position:absolute;
  bottom:30px;left:2px;
  width:26px;height:42px;
  background:radial-gradient(ellipse at 60% 40%, #8B5FEE 0%, #4A22A0 100%);
  border-radius:50% 20% 50% 50%;
  transform:rotate(-25deg);
  transform-origin:bottom right;
}
/* right wing */
.f-wing-r{
  position:absolute;
  bottom:30px;right:2px;
  width:26px;height:42px;
  background:radial-gradient(ellipse at 40% 40%, #8B5FEE 0%, #4A22A0 100%);
  border-radius:20% 50% 50% 50%;
  transform:rotate(25deg);
  transform-origin:bottom left;
}
/* top spike */
.f-tip{
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:22px;height:38px;
  background:radial-gradient(ellipse at 50% 30%, #C9A8FF 0%, #7B45CC 60%, #3D1890 100%);
  border-radius:50% 50% 40% 40%;
}
/* inner core glow */
.f-core{
  position:absolute;
  bottom:18px;left:50%;
  transform:translateX(-50%);
  width:44px;height:55px;
  background:radial-gradient(ellipse at 50% 35%, rgba(224,212,255,.55) 0%, rgba(169,143,255,.2) 55%, transparent 100%);
  border-radius:50%;
  pointer-events:none;
}

/* ── FACE ── sits on lower body */
.f-face{
  position:absolute;
  bottom:8px;left:50%;
  transform:translateX(-50%);
  width:68px;height:64px;
  background:radial-gradient(ellipse at 50% 38%, #6B4ACC 0%, #3A1E8A 100%);
  border-radius:50%;
  overflow:visible;
}

/* cheeks */
.cheek{
  position:absolute;
  bottom:14px;
  width:16px;height:10px;
  background:radial-gradient(ellipse, rgba(192,132,252,.55) 0%, transparent 100%);
  border-radius:50%;
}
.cheek-l{left:4px}
.cheek-r{right:4px}

/* eyes */
@keyframes blink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(.06)}}
.eye{
  position:absolute;
  top:14px;
  width:16px;height:17px;
  background:#fff;
  border-radius:50%;
  overflow:hidden;
}
.eye-l{left:10px}
.eye-r{right:10px}
.eye::after{ /* pupil */
  content:'';
  position:absolute;
  top:3px;left:3px;
  width:10px;height:11px;
  background:#180840;
  border-radius:50%;
  box-shadow:-3px -3px 0 2px rgba(255,255,255,.85);
}
.eye-l{animation:blink 3.8s ease-in-out infinite}
.eye-r{animation:blink 3.8s ease-in-out infinite .09s}

/* mouth states */
.mouth{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:30px;height:14px}
/* happy smile — CSS arc via border */
.m-happy{
  width:26px;height:13px;
  border:0 solid transparent;
  border-bottom:3px solid #fff;
  border-radius:0 0 50px 50px;
  margin:auto;
}
/* open excited */
.m-open{
  width:20px;height:14px;
  background:#fff;
  border-radius:0 0 50% 50%;
  margin:auto;
  position:relative;
  overflow:hidden;
}
.m-open::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:14px;height:9px;background:#C084FC;border-radius:0 0 50% 50%;
}
/* surprised O */
.m-surprised{
  width:13px;height:14px;
  background:#fff;
  border-radius:50%;
  margin:auto;
}
/* sad frown */
.m-sad{
  width:26px;height:13px;
  border:0 solid transparent;
  border-top:3px solid #fff;
  border-radius:50px 50px 0 0;
  margin:auto;
  margin-top:4px;
}
/* sweat drop */
.sweat{
  position:absolute;
  right:-4px;top:10px;
  width:7px;height:10px;
  background:rgba(169,143,255,.7);
  border-radius:50% 50% 50% 50% / 40% 40% 60% 60%;
  display:none;
}
@keyframes drip{0%{transform:translateY(0);opacity:.8}100%{transform:translateY(12px);opacity:0}}
.sweat.show{display:block;animation:drip 1.1s ease-in infinite}

/* ── CLICK HINT ── */
.chint{font-size:11px;color:var(--tm);text-align:center;margin-top:8px;opacity:.7;letter-spacing:.03em;min-height:16px;transition:color .4s}

/* ── STREAK NUM ── */
.snum{font-family:'Syne',sans-serif;font-size:64px;font-weight:800;color:var(--text);text-align:center;line-height:1;margin-bottom:4px;transition:color .5s,text-shadow .5s;letter-spacing:-2px}
.slbl{font-size:12px;font-weight:500;color:var(--tm);text-align:center;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.lastup{font-size:11px;color:var(--tm);text-align:center;margin-bottom:12px;opacity:.7;min-height:18px}
.today-badge{display:inline-block;background:rgba(61,52,138,.5);border:1px solid rgba(123,111,212,.4);border-radius:99px;padding:1px 8px;font-size:11px;color:var(--p7);margin-left:4px}
.deadmsg{font-size:12px;color:var(--tm);text-align:center;padding:7px 12px;background:rgba(10,8,20,.5);border:1px solid var(--border);border-radius:10px;margin-top:-6px;margin-bottom:10px;display:none}

/* progress */
.pt{width:100%;height:6px;background:rgba(123,111,212,.14);border-radius:99px;margin-bottom:7px;overflow:hidden}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p5),var(--p7));transition:width .6s cubic-bezier(.34,1.56,.64,1);position:relative}
.pf::after{content:'';position:absolute;right:0;top:0;width:12px;height:100%;background:rgba(255,255,255,.32);border-radius:99px;filter:blur(2px)}
.plbl{display:flex;justify-content:space-between;font-size:10px;color:var(--tm);margin-bottom:16px}
.div{width:100%;height:1px;background:var(--border);margin-bottom:12px}

/* stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:rgba(10,8,22,.55);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
.sv{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--p7);line-height:1;margin-bottom:3px}
.sl{font-size:9px;color:var(--tm);text-transform:uppercase;letter-spacing:.08em}

/* buttons */
.ar{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{border:1px solid var(--border);border-radius:12px;padding:10px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:.04em;transition:all .2s;text-align:center}
.btnp{background:linear-gradient(135deg,var(--p4),var(--p5));color:var(--p9);border-color:var(--p5)}
.btnp:hover{background:linear-gradient(135deg,var(--p5),var(--p6));transform:translateY(-1px);box-shadow:0 4px 20px rgba(85,70,184,.35)}
.btnp:active{transform:translateY(0)}
.btng{background:transparent;color:var(--tm)}
.btng:hover{background:rgba(123,111,212,.1);color:var(--p7);border-color:rgba(123,111,212,.4)}

/* milestone */
.mbanner{position:absolute;top:0;left:0;right:0;background:linear-gradient(135deg,var(--p4),var(--p6));color:var(--p9);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-align:center;padding:10px;transform:translateY(-100%);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:15;border-radius:var(--radius) var(--radius) 0 0}
.mbanner.show{transform:translateY(0)}

/* click particles */
.ptcl{position:absolute;border-radius:50%;pointer-events:none;z-index:10;animation:pfly .9s ease-out forwards}
@keyframes pfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
</style>
</head>
<body>
<div class="widget" id="widget">
<canvas id="bgc"></canvas>
<div class="mbanner" id="mbanner">🔥 MILESTONE!</div>
<div class="watermark">© by Kaizen Studio</div>

<div class="z brand">Content Creator Robot</div>

<!-- ── FLAME CHARACTER ── -->
<div class="z flame-stage">
  <div class="flame-wrap" id="flame-btn">
    <div class="char" id="char">
      <!-- flame layers -->
      <div class="f-tip"></div>
      <div class="f-wing-l"></div>
      <div class="f-wing-r"></div>
      <div class="f-body" id="fbody"></div>
      <div class="f-core"></div>
      <!-- face -->
      <div class="f-face" id="fface">
        <div class="eye eye-l"></div>
        <div class="eye eye-r"></div>
        <div class="cheek cheek-l"></div>
        <div class="cheek cheek-r"></div>
        <div class="mouth" id="mouth">
          <div class="m-happy" id="mhappy"></div>
          <div class="m-open" id="mopen" style="display:none"></div>
          <div class="m-surprised" id="msurprised" style="display:none"></div>
          <div class="m-sad" id="msad" style="display:none"></div>
        </div>
        <div class="sweat" id="sweat"></div>
      </div>
    </div>
  </div>
  <div class="z chint" id="chint">tap flame to log upload</div>
</div>

<div class="z snum" id="snum">0</div>
<div class="z slbl">day streak</div>
<div class="z lastup" id="lastup">no uploads logged yet</div>
<div class="z deadmsg" id="deadmsg">🪦 Streak burned out. Tap to restart.</div>

<div class="z pt"><div class="pf" id="pf" style="width:0%"></div></div>
<div class="z plbl"><span>0</span><span>3 days</span><span>7 days</span><span>14 days</span></div>
<div class="z div"></div>

<div class="z stats">
  <div class="sc"><div class="sv" id="sbest">0</div><div class="sl">Best streak</div></div>
  <div class="sc"><div class="sv" id="stotal">0</div><div class="sl">Total uploads</div></div>
  <div class="sc"><div class="sv" id="smissed">0</div><div class="sl">Days missed</div></div>
</div>

<div class="z ar">
  <button class="btn btnp" id="log-btn">+ Log Upload</button>
  <button class="btn btng" id="reset-btn">Reset streak</button>
</div>
</div>

<script>
/* ═══ BACKGROUND ANIMATION ═══ */
(function(){
  const cv=document.getElementById('bgc');
  const wg=document.getElementById('widget');
  cv.width=wg.offsetWidth;cv.height=wg.offsetHeight;
  const cx=cv.getContext('2d');
  const W=cv.width,H=cv.height;

  const orbs=Array.from({length:7},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:22+Math.random()*52,
    dx:(Math.random()-.5)*.14,dy:(Math.random()-.5)*.14,
    hue:252+Math.random()*48,a:.032+Math.random()*.065
  }));

  function mkStar(){return{x:Math.random()*W,y:Math.random()*H,r:.6+Math.random()*1.8,phase:Math.random()*Math.PI*2,speed:.04+Math.random()*.06,hue:255+Math.random()*45,baseA:.2+Math.random()*.55}}
  const stars=Array.from({length:55},mkStar);

  function mkShoot(){return{x:15+Math.random()*(W-30),y:H+8,len:6+Math.random()*18,speed:1.2+Math.random()*2.4,wobble:(Math.random()-.5)*.5,hue:258+Math.random()*42,a:.5+Math.random()*.45,life:0,maxLife:55+Math.random()*90}}
  const shoots=Array.from({length:18},()=>{const s=mkShoot();s.y=Math.random()*H;s.life=Math.random()*s.maxLife;return s;});

  function mkBurst(){return{x:Math.random()*W,y:Math.random()*H,life:0,maxLife:40+Math.random()*60,r:1.5+Math.random()*3,hue:260+Math.random()*40}}
  const bursts=Array.from({length:12},mkBurst);

  function drawStar4(x,y,r,color,alpha){
    cx.save();cx.globalAlpha=alpha;cx.fillStyle=color;cx.translate(x,y);
    for(let i=0;i<4;i++){cx.save();cx.rotate(i*Math.PI/2);cx.beginPath();cx.ellipse(0,-r,r*.18,r,0,0,Math.PI*2);cx.fill();cx.restore();}
    cx.beginPath();cx.arc(0,0,r*.3,0,Math.PI*2);cx.fill();cx.restore();
  }

  function tick(){
    cx.clearRect(0,0,W,H);
    orbs.forEach(o=>{
      o.x+=o.dx;o.y+=o.dy;
      if(o.x<-o.r)o.x=W+o.r;if(o.x>W+o.r)o.x=-o.r;
      if(o.y<-o.r)o.y=H+o.r;if(o.y>H+o.r)o.y=-o.r;
      const g=cx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,`hsla(${o.hue},68%,60%,${o.a})`);g.addColorStop(1,`hsla(${o.hue},68%,60%,0)`);
      cx.beginPath();cx.arc(o.x,o.y,o.r,0,Math.PI*2);cx.fillStyle=g;cx.fill();
    });
    stars.forEach(s=>{
      s.phase+=s.speed;
      const a=s.baseA*(.5+.5*Math.sin(s.phase));
      cx.save();cx.globalAlpha=a;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
      cx.fillStyle=`hsl(${s.hue},80%,82%)`;cx.shadowColor=`hsl(${s.hue},90%,75%)`;cx.shadowBlur=4;cx.fill();cx.restore();
    });
    shoots.forEach((s,i)=>{
      s.life++;s.y-=s.speed;s.x+=s.wobble;
      const a=s.a*Math.sin((s.life/s.maxLife)*Math.PI);
      cx.save();cx.globalAlpha=a;cx.strokeStyle=`hsl(${s.hue},85%,75%)`;cx.lineWidth=1.2;
      cx.shadowColor=`hsl(${s.hue},90%,70%)`;cx.shadowBlur=6;
      cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(s.x-s.wobble*3,s.y+s.len);cx.stroke();cx.restore();
      if(s.life>s.maxLife)shoots[i]=mkShoot();
    });
    bursts.forEach((b,i)=>{
      b.life++;
      const lr=b.life/b.maxLife;
      const a=lr<.3?(lr/.3)*.75:((1-lr)/.7)*.75;
      drawStar4(b.x,b.y,b.r*(0.4+lr*.6),`hsl(${b.hue},75%,78%)`,a);
      if(b.life>b.maxLife)bursts[i]=mkBurst();
    });
    requestAnimationFrame(tick);
  }
  tick();
})();

/* ═══ STREAK LOGIC ═══ */
const SK='ccr_streak_v1';
const MS=[3,7,14,21,30,50,100];
const COLS=['#A89FFF','#7B6FD4','#C9C2FF','#D4B8FF','#EAE8FF'];

function gs(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r)}catch(e){}
  return{streak:0,lastUpload:null,best:0,total:0,missed:0,todayLogged:false,msSeen:[]}}
function ss(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch(e){}}
function ds(d){return d.toISOString().split('T')[0]}
function td(){return ds(new Date())}
function yd(){const d=new Date();d.setDate(d.getDate()-1);return ds(d)}

function decay(s){
  if(!s.lastUpload)return s;
  if(s.lastUpload!==td()&&s.lastUpload!==yd()&&s.streak>0){
    const days=Math.floor((new Date(td())-new Date(s.lastUpload))/86400000)-1;
    s.missed+=Math.max(0,days);s.streak=0;s.todayLogged=false;
  }return s;
}

function expr(e){
  ['mhappy','mopen','msurprised','msad'].forEach(id=>document.getElementById(id).style.display='none');
  const el=document.getElementById('m'+e);if(el)el.style.display='';
  const sw=document.getElementById('sweat');
  if(e==='sad')sw.classList.add('show');else sw.classList.remove('show');
}

function intensity(k){
  if(k===0)return 0;if(k<=2)return.15;if(k<=3)return.32;
  if(k<=5)return.52;if(k<=7)return.67;if(k<=10)return.82;
  if(k<=14)return.96;return 1;
}

function applyFlame(k){
  const t=intensity(k);
  const fb=document.getElementById('fbody');
  const char=document.getElementById('char');

  // body glow intensity via box-shadow
  const glowSize=Math.floor(t*45);
  const glowA=(t*.72).toFixed(2);
  fb.style.boxShadow=`0 0 ${glowSize}px rgba(155,100,255,${glowA}), 0 0 ${Math.floor(glowSize*.5)}px rgba(200,160,255,${(t*.4).toFixed(2)})`;
  char.style.filter=`drop-shadow(0 0 ${Math.floor(t*30)}px rgba(155,100,255,${(t*.65).toFixed(2)}))`;

  // number colour
  const n=document.getElementById('snum');
  if(k===0){n.style.color='#3D2D6B';n.style.textShadow='none'}
  else{const v=168+Math.floor(t*82);n.style.color=`rgba(${v},${v-8},255,1)`;n.style.textShadow=`0 0 ${Math.floor(t*34)}px rgba(155,100,255,${(t*.7).toFixed(2)})`}

  document.getElementById('pf').style.width=Math.min(100,(k/14)*100)+'%';

  const h=document.getElementById('chint');
  if(k>=14)h.textContent='legendary streak! 👑';
  else if(k>=7)h.textContent='on fire! keep going 🔥';
  else if(k>=3)h.textContent='building momentum...';
  else h.textContent='tap flame to log upload';
}

function fmtDate(ds2){
  if(!ds2)return'never';
  return new Date(ds2+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function render(s){
  s=decay(s);
  document.getElementById('snum').textContent=s.streak;
  document.getElementById('sbest').textContent=s.best;
  document.getElementById('stotal').textContent=s.total;
  document.getElementById('smissed').textContent=s.missed;

  const le=document.getElementById('lastup'),de=document.getElementById('deadmsg');
  if(s.streak===0&&s.total>0){
    de.style.display='block';le.style.display='none';expr('sad');
  }else if(s.lastUpload){
    de.style.display='none';le.style.display='block';
    const it=s.lastUpload===td();
    le.innerHTML='last upload: '+fmtDate(s.lastUpload)+(it?'<span class="today-badge">today ✓</span>':'');
    expr('happy');
  }else{
    de.style.display='none';le.style.display='block';
    le.textContent='no uploads logged yet';expr('happy');
  }

  const lb=document.getElementById('log-btn');
  if(s.todayLogged&&s.lastUpload===td()){lb.textContent='✓ Logged today';lb.style.opacity='.58';lb.style.cursor='not-allowed';}
  else{lb.textContent='+ Log Upload';lb.style.opacity='1';lb.style.cursor='pointer';}

  applyFlame(s.streak);ss(s);
}

function spawnParticles(el){
  const wr=document.getElementById('widget').getBoundingClientRect();
  const er=el.getBoundingClientRect();
  const cx2=er.left+er.width/2-wr.left,cy2=er.top+er.height/2-wr.top;
  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='ptcl';
    const a=Math.random()*Math.PI*2,d=30+Math.random()*65,sz=2+Math.random()*5;
    p.style.cssText=`left:${cx2-sz/2}px;top:${cy2-sz/2}px;width:${sz}px;height:${sz}px;`+
      `--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;`+
      `background:${COLS[Math.floor(Math.random()*COLS.length)]};`+
      `animation-duration:${.5+Math.random()*.7}s`;
    document.getElementById('widget').appendChild(p);
    setTimeout(()=>p.remove(),1300);
  }
}

function showMilestone(k){
  const m={3:'🔥 3-Day Streak!',7:'⚡ One Week!',14:'🌟 Two Week Legend!',21:'💎 21-Day Beast!',
    30:'🏆 30-Day Champion!',50:'🚀 50 Days Unstoppable!',100:'👑 100 Days. Creator Royalty.'};
  if(!m[k])return;
  const b=document.getElementById('mbanner');b.textContent=m[k];b.classList.add('show');
  expr('surprised');setTimeout(()=>{b.classList.remove('show');expr('happy');},3200);
}

function logUpload(){
  let s=gs();s=decay(s);const t=td();
  if(s.todayLogged&&s.lastUpload===t)return;
  if(s.lastUpload===yd()||s.lastUpload===t){if(s.lastUpload!==t){s.streak++;s.todayLogged=true;s.lastUpload=t;}}
  else{s.streak=1;s.todayLogged=true;s.lastUpload=t;}
  s.total++;if(s.streak>s.best)s.best=s.streak;
  const isM=MS.includes(s.streak)&&!s.msSeen.includes(s.streak);
  if(isM){s.msSeen.push(s.streak);showMilestone(s.streak);}
  spawnParticles(document.getElementById('flame-btn'));
  const ch=document.getElementById('char');
  ch.classList.remove('pop');void ch.offsetWidth;ch.classList.add('pop');
  setTimeout(()=>ch.classList.remove('pop'),520);
  render(s);
}

document.getElementById('flame-btn').addEventListener('mouseenter',()=>{
  const s=gs();if(!(s.streak===0&&s.total>0))expr('open');
  applyFlame(Math.min(s.streak+3,16));
});
document.getElementById('flame-btn').addEventListener('mouseleave',()=>{
  const s=decay(gs());expr(s.streak===0&&s.total>0?'sad':'happy');applyFlame(s.streak);
});
document.getElementById('flame-btn').addEventListener('click',logUpload);
document.getElementById('log-btn').addEventListener('click',()=>{const s=gs();if(s.todayLogged&&s.lastUpload===td())return;logUpload();});
document.getElementById('reset-btn').addEventListener('click',()=>{
  const btn=document.getElementById('reset-btn');
  if(btn.dataset.confirming==='1'){
    btn.dataset.confirming='0';
    btn.textContent='Reset streak';
    btn.style.background='transparent';
    btn.style.color='var(--tm)';
    btn.style.borderColor='var(--border)';
    let s=gs();s.streak=0;s.todayLogged=false;s.lastUpload=null;render(s);
    return;
  }
  btn.dataset.confirming='1';
  btn.textContent='Tap again to confirm';
  btn.style.background='rgba(180,50,50,0.22)';
  btn.style.color='#FF9999';
  btn.style.borderColor='rgba(200,60,60,0.45)';
  setTimeout(()=>{
    if(btn.dataset.confirming==='1'){
      btn.dataset.confirming='0';
      btn.textContent='Reset streak';
      btn.style.background='transparent';
      btn.style.color='var(--tm)';
      btn.style.borderColor='var(--border)';
    }
  },3000);
});

render(gs());
</script>
</body>
</html>
